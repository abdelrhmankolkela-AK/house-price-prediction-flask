<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<title>توقع أسعار المنازل</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#2c3e50,#4ca1af);
margin:0;
}

.container{
width:600px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{text-align:center;}

input{
width:100%;
padding:12px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#27ae60;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{background:#219150;}

.error{
background:#ffd6d6;
padding:10px;
margin-top:15px;
border-radius:5px;
}

.result{
background:#d6ffd6;
padding:15px;
margin-top:15px;
border-radius:5px;
font-size:18px;
text-align:center;
}

.graph{
width:100%;
margin-top:20px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>🏠 توقع سعر المنزل</h1>

{% if error_msg %}
<div class="error">{{error_msg}}</div>
{% endif %}

{% if prediction %}
<div class="result">
السعر المتوقع: {{prediction}}
</div>
{% endif %}

<form method="post">

<label>متوسط دخل المنطقة</label>
<input type="number" step="any" name="income" required>

<label>متوسط عمر المنزل</label>
<input type="number" step="any" name="age" required>

<label>متوسط عدد الغرف</label>
<input type="number" step="any" name="rooms" required>

<label>متوسط عدد غرف النوم</label>
<input type="number" step="any" name="bedrooms" required>

<label>عدد السكان</label>
<input type="number" step="any" name="population" required>

<button type="submit">
احسب السعر
</button>

</form>

<img src="{{ url_for('static', filename='model.png') }}" class="graph">
<img src="{{ url_for('static', filename='cost for fold.png') }}" class="graph">

</div>

</body>
</html>
